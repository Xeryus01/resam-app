<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RESAM & DANSOS - Dari Kite Untuk Same-Same</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    html { scroll-behavior: smooth; }

      .mobile-nav { display: flex; }

      .mobile-nav { display: none !important; }

</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const RESAM_SHEET_ID = '1WXdKVjv4aqQpEAIkr_BrT-HKUG3EGO06';
    const RESAM_SHEET_GID = '378656488';
    const RESAM_SHEET_URL = `https://docs.google.com/spreadsheets/d/${RESAM_SHEET_ID}`;
    const RESAM_CSV_URL = `https://docs.google.com/spreadsheets/d/${RESAM_SHEET_ID}/export?format=csv&gid=${RESAM_SHEET_GID}`;

    const DANSOS_SHEET_ID = '17LfehIpUrkvy9pam3nFuECH54bLOdRXb';
    const DANSOS_SHEET_GID = '378656488';
    const DANSOS_SHEET_URL = `https://docs.google.com/spreadsheets/d/${DANSOS_SHEET_ID}`;
    const DANSOS_CSV_URL = `https://docs.google.com/spreadsheets/d/${DANSOS_SHEET_ID}/export?format=csv&gid=${DANSOS_SHEET_GID}`;
    const DANSOS_FOLDER_ID = '16tE9MUvmE4H1iPnRG59qhod_I3HiTytw';
    const DANSOS_EMBED_URL = `https://drive.google.com/embeddedfolderview?id=${DANSOS_FOLDER_ID}#grid`;

    const formatter = new Intl.NumberFormat('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    const currency = (n) => `Rp ${formatter.format(Math.round(Number(n) || 0))}`;

    function slug(text='') {
      return text.toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
    }

    function parseNumber(value) {
      if (value == null) return 0;
      let s = String(value).trim();
      if (!s) return 0;
      // Hapus Rp dan spasi
      s = s.replace(/rp/gi, '').replace(/\s+/g, '').trim();
      // Format: koma adalah pemisah ribuan (hapus), titik adalah desimal
      s = s.replace(/,/g, '');
      const num = Number(s);
      return Number.isFinite(num) ? num : 0;
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];
        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          row.push(current);
          current = '';
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') i++;
          row.push(current);
          rows.push(row);
          row = [];
          current = '';
        } else {
          current += char;
        }
      }
      if (current.length || row.length) {
        row.push(current);
        rows.push(row);
      }
      return rows.filter(r => r.some(c => String(c || '').trim() !== ''));
    }

    function parseDateIndo(str) {
      if (!str) return null;
      const value = String(str).trim();
      const months = {
        jan: 0, januari: 0,
        feb: 1, februari: 1,
        mar: 2, maret: 2,
        apr: 3, april: 3,
        mei: 4,
        jun: 5, juni: 5,
        jul: 6, juli: 6,
        ags: 7, agu: 7, agustus: 7,
        sep: 8, september: 8,
        okt: 9, oktober: 9,
        nov: 10, november: 10,
        des: 11, desember: 11,
      };
      const clean = value.replace(/\s+/g, '-').replace(/–/g, '-');
      const parts = clean.split('-').map(v => v.trim()).filter(Boolean);
      if (parts.length >= 3) {
        const d = parseInt(parts[0], 10);
        const m = months[slug(parts[1])];
        const y = parseInt(parts[2], 10) < 100 ? 2000 + parseInt(parts[2], 10) : parseInt(parts[2], 10);
        if (!Number.isNaN(d) && m !== undefined && !Number.isNaN(y)) return new Date(y, m, d);
      }
      const parsed = new Date(value);
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function transformRows(rawRows) {
      const cleaned = rawRows.map(r => r.map(c => String(c || '').trim()));
      const records = [];
      for (const r of cleaned) {
        if (r.length < 2) continue;
        const dateCandidate = parseDateIndo(r[0]);
        if (!dateCandidate) continue;
        const uraian = r[1] || '';
        const rincian = r[2] || '';
        const kredit = parseNumber(r[3]);
        const debit = parseNumber(r[4]);
        const saldo = parseNumber(r[5]);
        if (!uraian && !rincian && !kredit && !debit && !saldo) continue;
        records.push({
          tanggalRaw: r[0],
          tanggal: dateCandidate,
          uraian,
          rincian,
          kredit,
          debit,
          saldo,
        });
      }
      return records.sort((a,b) => a.tanggal - b.tanggal);
    }

    function transformRowsDansos(rawRows) {
      const cleaned = rawRows.map(r => r.map(c => String(c || '').trim()));
      const records = [];
      for (const r of cleaned) {
        if (r.length < 3) continue;
        // Coba gunakan kolom A (index 0), jika kosong gunakan kolom B (index 1)
        let dateCandidate = parseDateIndo(r[0]);
        if (!dateCandidate && r[1]) {
          dateCandidate = parseDateIndo(r[1]);
        }
        if (!dateCandidate) continue;
        
        // Struktur DANSOS: A=Tanggal1, B=Tanggal2, C=Uraian, D=Kredit, E=Debit, F=Saldo, G=Keterangan
        const uraian = r[2] || '';
        const kredit = parseNumber(r[3]);
        const debit = parseNumber(r[4]);
        const saldo = parseNumber(r[5]);
        
        if (!uraian && !kredit && !debit && !saldo) continue;
        records.push({
          tanggalRaw: r[0] || r[1],
          tanggal: dateCandidate,
          uraian,
          rincian: '',
          kredit,
          debit,
          saldo,
        });
      }
      return records.sort((a,b) => a.tanggal - b.tanggal);
    }

    function StatCard({ title, value, subtitle, icon, accent='from-sky-500 to-blue-600' }) {
      return (
        <div className="rounded-2xl sm:rounded-3xl bg-white shadow-sm border border-slate-100 p-4 sm:p-5 lg:p-6">
          <div className="flex items-start justify-between gap-3 sm:gap-4 min-w-0">
            <div className="min-w-0">
              <div className="text-xs sm:text-sm uppercase tracking-wide text-slate-500">{title}</div>
              <div className="mt-2 text-xl sm:text-2xl lg:text-2xl font-bold text-slate-800 whitespace-nowrap">{value}</div>
              {subtitle && <div className="mt-1 text-xs sm:text-sm text-slate-500">{subtitle}</div>}
            </div>
            <div className={`h-10 sm:h-12 w-10 sm:w-12 rounded-2xl bg-gradient-to-br ${accent} text-white flex items-center justify-center text-lg sm:text-xl shadow shrink-0`}>{icon}</div>
          </div>
        </div>
      );
    }

    function SectionTitle({ eyebrow, title, desc, isDark = false }) {
      return (
        <div className="max-w-3xl mx-auto text-center mb-6 sm:mb-8">
          {eyebrow && <div className={`text-xs font-semibold uppercase tracking-[0.2em] ${isDark ? 'text-sky-300' : 'text-sky-700'}`}>{eyebrow}</div>}
          <h2 className={`mt-1.5 sm:mt-2 text-xl sm:text-2xl lg:text-3xl font-bold ${isDark ? 'text-white' : 'text-slate-900'}`}>{title}</h2>
          {desc && <p className={`mt-1.5 sm:mt-2 text-xs sm:text-sm lg:text-base ${isDark ? 'text-sky-100' : 'text-slate-600'} leading-5 sm:leading-6`}>{desc}</p>}
        </div>
      );
    }

    function LineChart({ labels, data }) {
      const canvasRef = useRef(null);
      useEffect(() => {
        if (!canvasRef.current || !window.Chart) return;
        const chart = new Chart(canvasRef.current, {
          type: 'line',
          data: {
            labels,
            datasets: [{
              label: 'Saldo',
              data,
              borderWidth: 2,
              tension: 0.3,
              fill: false,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: true } },
            scales: {
              y: {
                ticks: {
                  callback: (value) => 'Rp ' + formatter.format(value)
                }
              }
            }
          }
        });
        return () => chart.destroy();
      }, [labels.join('|'), data.join('|')]);
      return <div className="h-[300px] sm:h-[340px] lg:h-[380px] w-full"><canvas ref={canvasRef}></canvas></div>;
    }

    function DoughnutChart({ labels, data }) {
      const canvasRef = useRef(null);
      useEffect(() => {
        if (!canvasRef.current || !window.Chart) return;
        const chart = new Chart(canvasRef.current, {
          type: 'doughnut',
          data: {
            labels,
            datasets: [{ data, borderWidth: 1 }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'bottom',
                labels: {
                  boxWidth: 12,
                  padding: 10,
                }
              }
            }
          }
        });
        return () => chart.destroy();
      }, [labels.join('|'), data.join('|')]);
      return <div className="h-[300px] sm:h-[340px] lg:h-[380px] w-full"><canvas ref={canvasRef}></canvas></div>;
    }

    function App() {
      const [resamRows, setResamRows] = useState([]);
      const [dansosRows, setDansosRows] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const [query, setQuery] = useState('');
      const [yearFilter, setYearFilter] = useState('');
      const [currentPage, setCurrentPage] = useState(1);
      const [activeTab, setActiveTab] = useState('resam'); // 'resam' or 'dansos'
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const itemsPerPage = 10;

      useEffect(() => {
        Promise.all([
          fetch(RESAM_CSV_URL).then(res => res.ok ? res.text() : Promise.reject('RESAM sheet not accessible')).then(text => transformRows(parseCSV(text))).catch(() => {
            // Fallback dummy data for RESAM
            return [
              { tanggalRaw: '1 Januari 2024', tanggal: new Date(2024, 0, 1), uraian: 'Pemasukan Bulanan', rincian: '', kredit: 50000, debit: 0, saldo: 50000 },
              { tanggalRaw: '15 Januari 2024', tanggal: new Date(2024, 0, 15), uraian: 'Konsumsi', rincian: 'Snack dan minum', kredit: 0, debit: 15000, saldo: 35000 },
              { tanggalRaw: '1 Februari 2024', tanggal: new Date(2024, 1, 1), uraian: 'Pemasukan Bulanan', rincian: '', kredit: 50000, debit: 0, saldo: 85000 },
            ];
          }),
          fetch(DANSOS_CSV_URL).then(res => res.ok ? res.text() : Promise.reject('DANSOS sheet not accessible')).then(text => transformRowsDansos(parseCSV(text))).catch(() => {
            // Fallback dummy data for DANSOS
            return [
              { tanggalRaw: '5 Januari 2024', tanggal: new Date(2024, 0, 5), uraian: 'Pemasukan DANSOS', rincian: '', kredit: 80000, debit: 0, saldo: 80000 },
              { tanggalRaw: '12 Januari 2024', tanggal: new Date(2024, 0, 12), uraian: 'Bantuan Kesehatan', rincian: '', kredit: 0, debit: 500000, saldo: -420000 },
              { tanggalRaw: '20 Januari 2024', tanggal: new Date(2024, 0, 20), uraian: 'Pemasukan DANSOS', rincian: '', kredit: 80000, debit: 0, saldo: -340000 },
            ];
          })
        ]).then(([resam, dansos]) => {
          setResamRows(resam);
          setDansosRows(dansos);
          if (resam.length === 0 && dansos.length === 0) {
            setError('Data tidak tersedia. Menampilkan data contoh.');
          }
        }).catch((err) => {
          console.error('Error loading data:', err);
          setError('Data spreadsheet tidak dapat dimuat otomatis. Menampilkan data contoh.');
        }).finally(() => setLoading(false));
      }, []);

      const currentRows = activeTab === 'resam' ? resamRows : dansosRows;

      // Set default year filter ke tahun terakhir
      useEffect(() => {
        if (currentRows.length > 0) {
          const years = [...new Set(currentRows.map(r => r.tanggal.getFullYear()))].sort((a,b) => b-a);
          if (years.length > 0 && !yearFilter) {
            setYearFilter(String(years[0]));
          }
        }
      }, [currentRows, yearFilter, activeTab]);

      const years = useMemo(() => {
        return [...new Set(currentRows.map(r => r.tanggal.getFullYear()))].sort((a,b) => b-a);
      }, [currentRows]);

      // Filter by year only for stats/charts
      const yearFilteredRows = useMemo(() => {
        return currentRows.filter(r => {
          return yearFilter === 'all' || String(r.tanggal.getFullYear()) === yearFilter;
        }).sort((a, b) => b.tanggal - a.tanggal);
      }, [currentRows, yearFilter]);

      // Filter by year and search query for table
      const filteredRows = useMemo(() => {
        return yearFilteredRows.filter(r => {
          const text = `${r.tanggalRaw} ${r.uraian} ${r.rincian}`.toLowerCase();
          return !query.trim() || text.includes(query.toLowerCase());
        });
      }, [yearFilteredRows, query]);

      // Pagination logic
      const totalPages = Math.ceil(filteredRows.length / itemsPerPage);
      const paginatedRows = useMemo(() => {
        const start = (currentPage - 1) * itemsPerPage;
        return filteredRows.slice(start, start + itemsPerPage);
      }, [filteredRows, currentPage]);

      // Reset to page 1 when filter changes
      useEffect(() => {
        setCurrentPage(1);
      }, [yearFilter, query, activeTab]);

      const stats = useMemo(() => {
        const totalPemasukan = yearFilteredRows.reduce((s, r) => s + r.kredit, 0);
        const totalPengeluaran = yearFilteredRows.reduce((s, r) => s + r.debit, 0);
        
        // For DANSOS: take from the last row (chronologically last)
        // For RESAM: take from the most recent date
        let latestRow = yearFilteredRows.length ? yearFilteredRows[0] : null;
        if (activeTab === 'dansos' && yearFilteredRows.length > 0) {
          const sorted = [...yearFilteredRows].sort((a, b) => a.tanggal - b.tanggal);
          latestRow = sorted[sorted.length - 1];
        }
        
        const saldoAkhir = latestRow ? latestRow.saldo : 0;
        const totalTransaksi = yearFilteredRows.length;
        return { totalPemasukan, totalPengeluaran, saldoAkhir, totalTransaksi, latest: latestRow };
      }, [yearFilteredRows, activeTab]);

      const monthlySeries = useMemo(() => {
        const map = new Map();
        yearFilteredRows.forEach(r => {
          const key = `${r.tanggal.getFullYear()}-${String(r.tanggal.getMonth()+1).padStart(2,'0')}`;
          map.set(key, { label: r.tanggal.toLocaleDateString('id-ID', { month: 'short', year: 'numeric' }), saldo: r.saldo, income: 0, expense: 0 });
          const item = map.get(key);
          item.income += r.kredit;
          item.expense += r.debit;
          item.saldo = r.saldo || item.saldo;
        });
        const arr = [...map.values()];
        return arr;
      }, [yearFilteredRows]);

      const getCategoryForResam = (uraian, rincian) => {
        const text = `${uraian} ${rincian}`.toLowerCase();
        
        // Konsumsi - makanan, minuman, snack
        if (text.includes('konsumsi') || text.includes('makan') || text.includes('snack') || text.includes('minuman') || 
            text.includes('air mineral') || text.includes('kopi') || text.includes('teh') || text.includes('makanan') ||
            text.includes('pesan') || text.includes('pesanan') || text.includes('beli') || text.includes('belanja')) {
          return 'Konsumsi';
        }
        
        // Kegiatan - acara dan kegiatan kebersamaan
        if (text.includes('kegiatan') || text.includes('bedulang') || text.includes('hsn') || text.includes('senam') || 
            text.includes('jumat bersih') || text.includes('17 agustus') || text.includes('hut') || text.includes('acara') ||
            text.includes('upacara') || text.includes('gathering') || text.includes('olahraga') || text.includes('games') ||
            text.includes('hadiah') || text.includes('piala') || text.includes('trophy')) {
          return 'Kegiatan';
        }
        
        // Perlengkapan - barang, supplies, equipment
        if (text.includes('perlengkapan') || text.includes('spanduk') || text.includes('gelas') || text.includes('plastik') || 
            text.includes('banner') || text.includes('barang') || text.includes('supplies') || text.includes('peralatan') ||
            text.includes('pita') || text.includes('bendera') || text.includes('kertas') || text.includes('sticker') ||
            text.includes('papan') || text.includes('dekorasi') || text.includes('tenda') || text.includes('sound')) {
          return 'Perlengkapan';
        }
        
        // Operasional - transportasi, jasa, dll
        if (text.includes('transport') || text.includes('bensin') || text.includes('jasa') || text.includes('operasional') ||
            text.includes('biaya') || text.includes('akomodasi') || text.includes('hotel') || text.includes('ticket') ||
            text.includes('dokumentasi') || text.includes('foto') || text.includes('video')) {
          return 'Operasional';
        }
        
        return 'Lainnya';
      };

      const getCategoryForDansos = (uraian) => {
        const text = uraian.toLowerCase();
        if (text.includes('kesehatan') || text.includes('sakit') || text.includes('opname')) return 'Bantuan Kesehatan';
        if (text.includes('menikah')) return 'Bantuan Menikah';
        if (text.includes('meninggal')) return 'Bantuan Meninggal';
        if (text.includes('melahirkan') || text.includes('bayi')) return 'Bantuan Melahirkan';
        if (text.includes('donor') || text.includes('darah')) return 'Donor Darah';
        if (text.includes('mutasi') || text.includes('pindah') || text.includes('purnabakti')) return 'Mutasi/Purnabakti';
        if (text.includes('pemasukan')) return 'Pemasukan';
        return uraian || 'Lainnya';
      };

      const expenseByCategory = useMemo(() => {
        const bucket = {};
        yearFilteredRows.filter(r => r.debit > 0).forEach(r => {
          const category = activeTab === 'resam' 
            ? getCategoryForResam(r.uraian, r.rincian)
            : getCategoryForDansos(r.uraian);
          bucket[category] = (bucket[category] || 0) + r.debit;
        });
        return bucket;
      }, [yearFilteredRows, activeTab]);

      const highlights = useMemo(() => {
        return yearFilteredRows
          .filter(r => r.debit > 0)
          .sort((a,b) => b.debit - a.debit)
          .slice(0, 5);
      }, [yearFilteredRows]);

      const resamDefinition = `RESAM merupakan singkatan dari "Dari Kite Untuk Same-Same", yaitu urunan seluruh pegawai BPS Provinsi Kepulauan Bangka Belitung (tidak termasuk pegawai outsourcing) sesuai rate yang telah disepakati. Dana ini dikelola oleh Pengurus RESAM dan dimanfaatkan untuk kegiatan kebersamaan serta kegiatan sosial yang melibatkan seluruh pegawai termasuk pegawai outsourcing.`;

      const dansosDefinition = `DANSOS merupakan singkatan dari Dana Sosial, yaitu dana yang dikumpulkan dari pegawai BPS Provinsi Kepulauan Bangka Belitung untuk kegiatan sosial dan kemanusiaan. Dana ini digunakan untuk membantu masyarakat yang membutuhkan, seperti bantuan kesehatan, pendidikan, dan kegiatan sosial lainnya.`;

      const currentDefinition = activeTab === 'resam' ? resamDefinition : dansosDefinition;
      const currentTitle = activeTab === 'resam' ? 'RESAM' : 'DANSOS';
      const currentSubtitle = activeTab === 'resam' ? 'Dari Kite Untuk Same-Same' : 'Dana Sosial';

      return (
        <div className="min-h-screen text-slate-800">
          <header className="sticky top-0 z-40 bg-white/90 backdrop-blur border-b border-slate-200">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
              <a href="#beranda" className="flex items-center gap-2 sm:gap-3 font-bold text-slate-900 shrink-0">
                <img src="logo.png" alt="RESAM Logo" className="h-8 sm:h-10 w-8 sm:w-10 rounded-xl shadow object-contain" />
                <div>
                  <div className="text-sm sm:text-lg leading-none">{currentTitle}</div>
                  <div className="text-[10px] sm:text-xs text-slate-500 font-medium">{currentSubtitle}</div>
                </div>
              </a>
              <nav className="desktop-nav items-center gap-6 text-sm text-slate-600">
                <a href="#beranda" className="hover:text-sky-700 transition">Beranda</a>
                <a href="#tentang" className="hover:text-sky-700 transition">Tentang</a>
                <a href="#keuangan" className="hover:text-sky-700 transition">Data</a>
                <a href="#rate" className="hover:text-sky-700 transition">Rate</a>
                <a href="#dokumentasi" className="hover:text-sky-700 transition">Dokumentasi</a>
              </nav>
              <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="mobile-nav items-center gap-3 text-slate-700">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>
              </button>
            </div>
            {mobileMenuOpen && (
              <div className="mobile-nav flex-col px-4 py-3 border-t border-slate-200 bg-slate-50 gap-2">
                <a href="#beranda" onClick={() => setMobileMenuOpen(false)} className="py-2 text-slate-700 hover:text-sky-700 transition">Beranda</a>
                <a href="#tentang" onClick={() => setMobileMenuOpen(false)} className="py-2 text-slate-700 hover:text-sky-700 transition">Tentang</a>
                <a href="#keuangan" onClick={() => setMobileMenuOpen(false)} className="py-2 text-slate-700 hover:text-sky-700 transition">Data</a>
                <a href="#rate" onClick={() => setMobileMenuOpen(false)} className="py-2 text-slate-700 hover:text-sky-700 transition">Rate</a>
                <a href="#dokumentasi" onClick={() => setMobileMenuOpen(false)} className="py-2 text-slate-700 hover:text-sky-700 transition">Dokumentasi</a>
              </div>
            )}
          </header>
