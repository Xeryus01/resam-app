<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const SHEET_ID = '1zI1n2EcXCTfaSvejnbtMMYV3ykGmQu-j';
    const SHEET_GID = '378656488';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${SHEET_GID}`;
    const DRIVE_FOLDER_ID = '16tE9MUvmE4H1iPnRG59qhod_I3HiTytw';
    const DRIVE_FOLDER_URL = `https://drive.google.com/drive/folders/${DRIVE_FOLDER_ID}?usp=sharing`;
    const DRIVE_EMBED_URL = `https://drive.google.com/embeddedfolderview?id=${DRIVE_FOLDER_ID}#grid`;
    const GOOGLE_DRIVE_API_KEY = 'AIzaSyA5iWmjK8nnZgmWJuQbqCGeDmHzlize2hY';
    const DRIVE_API_BASE = 'https://www.googleapis.com/drive/v3/files';

    const formatter = new Intl.NumberFormat('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    const currency = (n) => `Rp ${formatter.format(Math.round(Number(n) || 0))}`;

    function slug(text='') {
      return text.toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
    }

    function parseNumber(value) {
      if (value == null) return 0;
      let s = String(value).trim();
      if (!s) return 0;
      // Hapus Rp dan spasi
      s = s.replace(/rp/gi, '').replace(/\s+/g, '').trim();
      // Format: koma adalah pemisah ribuan (hapus), titik adalah desimal
      s = s.replace(/,/g, '');
      const num = Number(s);
      return Number.isFinite(num) ? num : 0;
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];
        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          row.push(current);
          current = '';
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') i++;
          row.push(current);
          rows.push(row);
          row = [];
          current = '';
        } else {
          current += char;
        }
      }
      if (current.length || row.length) {
        row.push(current);
        rows.push(row);
      }
      return rows.filter(r => r.some(c => String(c || '').trim() !== ''));
    }

    function parseDateIndo(str) {
      if (!str) return null;
      const value = String(str).trim();
      const months = {
        jan: 0, januari: 0,
        feb: 1, februari: 1,
        mar: 2, maret: 2,
        apr: 3, april: 3,
        mei: 4,
        jun: 5, juni: 5,
        jul: 6, juli: 6,
        ags: 7, agu: 7, agustus: 7,
        sep: 8, september: 8,
        okt: 9, oktober: 9,
        nov: 10, november: 10,
        des: 11, desember: 11,
      };
      const clean = value.replace(/\s+/g, '-').replace(/–/g, '-');
      const parts = clean.split('-').map(v => v.trim()).filter(Boolean);
      if (parts.length >= 3) {
        const d = parseInt(parts[0], 10);
        const m = months[slug(parts[1])];
        const y = parseInt(parts[2], 10) < 100 ? 2000 + parseInt(parts[2], 10) : parseInt(parts[2], 10);
        if (!Number.isNaN(d) && m !== undefined && !Number.isNaN(y)) return new Date(y, m, d);
      }
      const parsed = new Date(value);
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }



    function detectYearFromText(text='') {
      const match = String(text).match(/(?:19|20)\d{2}/);
      return match ? match[0] : '';
    }

    function buildDriveThumbnail(fileId, size = 1200) {
      return `https://drive.google.com/thumbnail?id=${fileId}&sz=w${size}`;
    }

    function buildDriveViewUrl(fileId) {
      return `https://drive.google.com/file/d/${fileId}/view`;
    }

    async function listDriveChildren(folderId, apiKey, pageToken='') {
      const query = `'${folderId}' in parents and trashed = false`;
      const params = new URLSearchParams({
        key: apiKey,
        q: query,
        fields: 'nextPageToken, files(id,name,mimeType,webViewLink,thumbnailLink,createdTime,imageMediaMetadata)',
        orderBy: 'folder,name,createdTime desc',
        pageSize: '1000',
        includeItemsFromAllDrives: 'true',
        supportsAllDrives: 'true',
      });
      if (pageToken) params.set('pageToken', pageToken);
      const response = await fetch(`${DRIVE_API_BASE}?${params.toString()}`);
      if (!response.ok) {
        throw new Error('Tidak dapat mengakses Google Drive API. Pastikan API key benar dan folder dibagikan publik.');
      }
      return response.json();
    }

    async function getGalleryYearsFromDrive(folderId, apiKey) {
      try {
        const data = await listDriveChildren(folderId, apiKey);
        const years = new Set();
        for (const file of (data.files || [])) {
          const lowerMime = String(file.mimeType || '').toLowerCase();
          if (lowerMime === 'application/vnd.google-apps.folder') {
            const year = detectYearFromText(file.name);
            if (year) years.add(year);
          }
        }
        return Array.from(years).map(y => Number(y)).sort((a, b) => b - a);
      } catch (error) {
        console.warn('Gagal mengambil daftar tahun dari Drive:', error);
        return [];
      }
    }

    async function fetchAllDriveImages(rootFolderId, apiKey) {
      const foldersToVisit = [{ id: rootFolderId, path: [], inferredYear: '' }];
      const photos = [];
      while (foldersToVisit.length) {
        const current = foldersToVisit.shift();
        let pageToken = '';
        do {
          const data = await listDriveChildren(current.id, apiKey, pageToken);
          pageToken = data.nextPageToken || '';
          for (const file of (data.files || [])) {
            const lowerMime = String(file.mimeType || '').toLowerCase();
            if (lowerMime === 'application/vnd.google-apps.folder') {
              const folderYear = detectYearFromText(file.name) || current.inferredYear || '';
              foldersToVisit.push({
                id: file.id,
                path: [...current.path, file.name],
                inferredYear: folderYear,
              });
              continue;
            }
            if (!lowerMime.startsWith('image/')) continue;
            const folderPath = current.path.join(' / ');
            const detectedYear = current.inferredYear || detectYearFromText(`${folderPath} ${file.name} ${file.createdTime || ''}`) || (file.createdTime ? new Date(file.createdTime).getFullYear().toString() : 'Tanpa Tahun');
            photos.push({
              id: file.id,
              name: file.name,
              url: buildDriveThumbnail(file.id, 1600),
              thumb: buildDriveThumbnail(file.id, 800),
              webViewLink: file.webViewLink || buildDriveViewUrl(file.id),
              folderPath: folderPath || 'Folder Utama',
              year: detectedYear || 'Tanpa Tahun',
              createdTime: file.createdTime || '',
            });
          }
        } while (pageToken);
      }
      return photos.sort((a, b) => {
        const ay = Number(a.year) || 0;
        const by = Number(b.year) || 0;
        if (by !== ay) return by - ay;
        return String(b.createdTime).localeCompare(String(a.createdTime));
      });
    }

    function transformRows(rawRows) {
      const cleaned = rawRows.map(r => r.map(c => String(c || '').trim()));
      const records = [];
      for (const r of cleaned) {
        if (r.length < 2) continue;
        const dateCandidate = parseDateIndo(r[0]);
        if (!dateCandidate) continue;
        const uraian = r[1] || '';
        const rincian = r[2] || '';
        const kredit = parseNumber(r[3]);
        const debit = parseNumber(r[4]);
        const saldo = parseNumber(r[5]);
        if (!uraian && !rincian && !kredit && !debit && !saldo) continue;
        records.push({
          tanggalRaw: r[0],
          tanggal: dateCandidate,
          uraian,
          rincian,
          kredit,
          debit,
          saldo,
        });
      }
      return records.sort((a,b) => a.tanggal - b.tanggal);
    }

    function StatCard({ title, value, subtitle, icon, accent='from-sky-500 to-blue-600' }) {
      return (
        <div className="rounded-2xl sm:rounded-3xl bg-white shadow-sm border border-slate-100 p-4 sm:p-5 lg:p-6">
          <div className="flex items-start justify-between gap-3 sm:gap-4 min-w-0">
            <div className="min-w-0">
              <div className="text-xs sm:text-sm uppercase tracking-wide text-slate-500">{title}</div>
              <div className="mt-2 text-xl sm:text-2xl lg:text-2xl font-bold text-slate-800 whitespace-nowrap">{value}</div>
              {subtitle && <div className="mt-1 text-xs sm:text-sm text-slate-500">{subtitle}</div>}
            </div>
            <div className={`h-10 sm:h-12 w-10 sm:w-12 rounded-2xl bg-gradient-to-br ${accent} text-white flex items-center justify-center text-lg sm:text-xl shadow shrink-0`}>{icon}</div>
          </div>
        </div>
      );
    }

    function SectionTitle({ eyebrow, title, desc }) {
      return (
        <div className="max-w-3xl mx-auto text-center mb-8 sm:mb-10 lg:mb-12">
          {eyebrow && <div className="text-xs sm:text-sm font-semibold uppercase tracking-[0.2em] text-sky-700">{eyebrow}</div>}
          <h2 className="mt-2 sm:mt-3 text-2xl sm:text-3xl lg:text-4xl font-bold text-slate-900">{title}</h2>
          {desc && <p className="mt-2 sm:mt-3 text-sm sm:text-base lg:text-lg text-slate-600 leading-6 sm:leading-7 lg:leading-8">{desc}</p>}
        </div>
      );
    }

    function LineChart({ labels, data }) {
      const canvasRef = useRef(null);
      useEffect(() => {
        if (!canvasRef.current || !window.Chart) return;
        const chart = new Chart(canvasRef.current, {
          type: 'line',
          data: {
            labels,
            datasets: [{
              label: 'Saldo',
              data,
              borderWidth: 2,
              tension: 0.3,
              fill: false,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: true } },
            scales: {
              y: {
                ticks: {
                  callback: (value) => 'Rp ' + formatter.format(value)
                }
              }
            }
          }
        });
        return () => chart.destroy();
      }, [labels.join('|'), data.join('|')]);
      return <div className="h-[300px] sm:h-[340px] lg:h-[380px] w-full"><canvas ref={canvasRef}></canvas></div>;
    }

    function DoughnutChart({ labels, data }) {
      const canvasRef = useRef(null);
      useEffect(() => {
        if (!canvasRef.current || !window.Chart) return;
        const chart = new Chart(canvasRef.current, {
          type: 'doughnut',
          data: {
            labels,
            datasets: [{ data, borderWidth: 1 }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'bottom',
                labels: {
                  boxWidth: 12,
                  padding: 10,
                }
              }
            }
          }
        });
        return () => chart.destroy();
      }, [labels.join('|'), data.join('|')]);
      return <div className="h-[300px] sm:h-[340px] lg:h-[380px] w-full"><canvas ref={canvasRef}></canvas></div>;
    }

    function App() {
      const [rows, setRows] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const [query, setQuery] = useState('');
      const [yearFilter, setYearFilter] = useState('');
      const [currentPage, setCurrentPage] = useState(1);
      const [galleryPhotos, setGalleryPhotos] = useState([]);
      const [galleryLoading, setGalleryLoading] = useState(true);
      const [galleryError, setGalleryError] = useState('');
      const [selectedGalleryYear, setSelectedGalleryYear] = useState('');
      const [galleryIndex, setGalleryIndex] = useState(0);
      const [galleryPhotosLoaded, setGalleryPhotosLoaded] = useState({});
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [availableGalleryYears, setAvailableGalleryYears] = useState([]);
      const itemsPerPage = 10;

      // Load available gallery years from Google Drive folders on mount
      useEffect(() => {
        let mounted = true;
        async function loadAvailableYears() {
          if (!GOOGLE_DRIVE_API_KEY || GOOGLE_DRIVE_API_KEY === 'PASTE_YOUR_GOOGLE_DRIVE_API_KEY_HERE') {
            return;
          }
          try {
            const years = await getGalleryYearsFromDrive(DRIVE_FOLDER_ID, GOOGLE_DRIVE_API_KEY);
            if (mounted) {
              setAvailableGalleryYears(years);
            }
          } catch (err) {
            console.warn('Gagal memuat daftar tahun galeri:', err);
          }
        }
        loadAvailableYears();
        return () => {
          mounted = false;
        };
      }, []);

      useEffect(() => {
        fetch(CSV_URL)
          .then(res => res.text())
          .then(text => {
            const parsed = transformRows(parseCSV(text));
            setRows(parsed);
          })
          .catch(() => {
            setError('Data spreadsheet tidak dapat dimuat otomatis. Silakan cek koneksi atau izin file Google Sheets.');
          })
          .finally(() => setLoading(false));
      }, []);



      useEffect(() => {
        let mounted = true;
        async function loadGalleryByYear() {
          if (!selectedGalleryYear || selectedGalleryYear === '') return;
          if (galleryPhotosLoaded[selectedGalleryYear]) return;
          
          if (!GOOGLE_DRIVE_API_KEY || GOOGLE_DRIVE_API_KEY === 'PASTE_YOUR_GOOGLE_DRIVE_API_KEY_HERE') {
            if (mounted) {
              setGalleryError('Galeri otomatis belum aktif. Isi GOOGLE_DRIVE_API_KEY agar foto dari seluruh folder/subfolder dapat dimuat.');
              setGalleryLoading(false);
            }
            return;
          }
          
          try {
            setGalleryLoading(true);
            const photos = await fetchAllDriveImages(DRIVE_FOLDER_ID, GOOGLE_DRIVE_API_KEY);
            if (mounted) {
              setGalleryPhotos(photos);
              setGalleryPhotosLoaded(prev => ({...prev, [selectedGalleryYear]: true}));
              if (!photos.length) setGalleryError('Belum ada foto publik yang ditemukan di folder dokumentasi.');
              else setGalleryError('');
            }
          } catch (err) {
            if (mounted) setGalleryError(err.message || 'Galeri otomatis gagal dimuat dari Google Drive API.');
          } finally {
            if (mounted) setGalleryLoading(false);
          }
        }
        loadGalleryByYear();
        return () => { mounted = false; };
      }, [selectedGalleryYear, galleryPhotosLoaded]);

      // Set default year filter ke tahun terakhir
      useEffect(() => {
        if (rows.length > 0) {
          const years = [...new Set(rows.map(r => r.tanggal.getFullYear()))].sort((a,b) => b-a);
          if (years.length > 0 && !yearFilter) {
            setYearFilter(String(years[0]));
          }
        }
      }, [rows, yearFilter]);

      const years = useMemo(() => {
        return [...new Set(rows.map(r => r.tanggal.getFullYear()))].sort((a,b) => b-a);
      }, [rows]);

      // Filter by year only for stats/charts
      const yearFilteredRows = useMemo(() => {
        return rows.filter(r => {
          return yearFilter === 'all' || String(r.tanggal.getFullYear()) === yearFilter;
        }).sort((a, b) => b.rowIndex - a.rowIndex);
      }, [rows, yearFilter]);

      // Filter by year and search query for table
      const filteredRows = useMemo(() => {
        return yearFilteredRows.filter(r => {
          const text = `${r.tanggalRaw} ${r.uraian} ${r.rincian}`.toLowerCase();
          return !query.trim() || text.includes(query.toLowerCase());
        });
      }, [yearFilteredRows, query]);

      // Pagination logic
      const totalPages = Math.ceil(filteredRows.length / itemsPerPage);
      const paginatedRows = useMemo(() => {
        const start = (currentPage - 1) * itemsPerPage;
        return filteredRows.slice(start, start + itemsPerPage);
      }, [filteredRows, currentPage]);

      // Reset to page 1 when filter changes
      useEffect(() => {
        setCurrentPage(1);
      }, [yearFilter, query]);



      const galleryYears = useMemo(() => {
        // Prioritize years from Google Drive folder structure
        if (availableGalleryYears.length > 0) {
          return availableGalleryYears;
        }
        // Fallback to years detected from photos
        const years = [...new Set(galleryPhotos.map(item => item.year).filter(Boolean))]
          .sort((a, b) => (Number(b) || 0) - (Number(a) || 0));
        return years;
      }, [galleryPhotos, availableGalleryYears]);

      const filteredGalleryPhotos = useMemo(() => {
        return galleryPhotos.filter(item => selectedGalleryYear === 'all' || item.year === selectedGalleryYear);
      }, [galleryPhotos, selectedGalleryYear]);

      useEffect(() => {
        setGalleryIndex(0);
      }, [selectedGalleryYear, galleryPhotos.length]);

      useEffect(() => {
        if (filteredGalleryPhotos.length <= 1) return;
        const interval = setInterval(() => {
          setGalleryIndex(prev => (prev + 1) % filteredGalleryPhotos.length);
        }, 3500);
        return () => clearInterval(interval);
      }, [filteredGalleryPhotos.length]);

      const visibleGalleryPhotos = useMemo(() => {
        if (!filteredGalleryPhotos.length) return [];
        const count = Math.min(4, filteredGalleryPhotos.length);
        return Array.from({ length: count }, (_, offset) => filteredGalleryPhotos[(galleryIndex + offset) % filteredGalleryPhotos.length]);
      }, [filteredGalleryPhotos, galleryIndex]);

      const stats = useMemo(() => {
        const totalPemasukan = yearFilteredRows.reduce((s, r) => s + r.kredit, 0);
        const totalPengeluaran = yearFilteredRows.reduce((s, r) => s + r.debit, 0);
        const saldoAkhir = yearFilteredRows.length ? yearFilteredRows[yearFilteredRows.length - 1].saldo : 0;
        const totalTransaksi = yearFilteredRows.length;
        const latest = yearFilteredRows.length ? yearFilteredRows[yearFilteredRows.length - 1] : null;
        const danaSosial = yearFilteredRows
          .filter(r => slug(`${r.uraian} ${r.rincian}`).includes('dana sosial') || slug(r.uraian).includes('dansos'))
          .reduce((s, r) => s + Math.max(r.debit, r.kredit), 0);
        return { totalPemasukan, totalPengeluaran, saldoAkhir, totalTransaksi, latest, danaSosial };
      }, [yearFilteredRows]);

      const monthlySeries = useMemo(() => {
        const map = new Map();
        yearFilteredRows.forEach(r => {
          const key = `${r.tanggal.getFullYear()}-${String(r.tanggal.getMonth()+1).padStart(2,'0')}`;
          map.set(key, { label: r.tanggal.toLocaleDateString('id-ID', { month: 'short', year: 'numeric' }), saldo: r.saldo, income: 0, expense: 0 });
          const item = map.get(key);
          item.income += r.kredit;
          item.expense += r.debit;
          item.saldo = r.saldo || item.saldo;
        });
        const arr = [...map.values()];
        return arr;
      }, [yearFilteredRows]);

      const expenseByCategory = useMemo(() => {
        const bucket = {};
        yearFilteredRows.filter(r => r.debit > 0).forEach(r => {
          const text = slug(`${r.uraian} ${r.rincian}`);
          let category = 'Lainnya';
          if (text.includes('konsumsi') || text.includes('makan') || text.includes('snack') || text.includes('air mineral') || text.includes('teh') || text.includes('kopi')) category = 'Konsumsi';
          else if (text.includes('donor darah') || text.includes('dana sosial') || text.includes('dansos')) category = 'Dana Sosial';
          else if (text.includes('hut') || text.includes('bedulang') || text.includes('hsn') || text.includes('sejati') || text.includes('jumat bersih')) category = 'Kegiatan';
          else if (text.includes('spanduk') || text.includes('gelas') || text.includes('plastik') || text.includes('paper')) category = 'Perlengkapan';
          bucket[category] = (bucket[category] || 0) + r.debit;
        });
        return bucket;
      }, [yearFilteredRows]);

      const highlights = useMemo(() => {
        return yearFilteredRows
          .filter(r => r.debit > 0)
          .sort((a,b) => b.debit - a.debit)
          .slice(0, 5);
      }, [yearFilteredRows]);

      const resamDefinition = `RESAM merupakan singkatan dari “Dari Kite Untuk Same-Same”, yaitu urunan seluruh pegawai BPS Provinsi Kepulauan Bangka Belitung (tidak termasuk pegawai outsourcing) sesuai rate yang telah disepakati. Dana ini dikelola oleh Pengurus RESAM dan dimanfaatkan untuk kegiatan kebersamaan serta kegiatan sosial yang melibatkan seluruh pegawai termasuk pegawai outsourcing.`;

      return (
        <div className="min-h-screen text-slate-800">
          <header className="sticky top-0 z-40 bg-white/90 backdrop-blur border-b border-slate-200">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
              <a href="#beranda" className="flex items-center gap-2 sm:gap-3 font-bold text-slate-900 shrink-0">
                <img src="logo.png" alt="RESAM Logo" className="h-8 sm:h-10 w-8 sm:w-10 rounded-xl shadow object-contain" />
                <div>
                  <div className="text-sm sm:text-lg leading-none">RESAM</div>
                  <div className="text-[10px] sm:text-xs text-slate-500 font-medium">Dari Kite Untuk Same-Same</div>
                </div>
              </a>
              <nav className="desktop-nav items-center gap-6 text-sm text-slate-600">
                <a href="#beranda" className="hover:text-sky-700 transition">Beranda</a>
                <a href="#tentang" className="hover:text-sky-700 transition">Tentang</a>
                <a href="#keuangan" className="hover:text-sky-700 transition">Data</a>
                <a href="#dokumentasi" className="hover:text-sky-700 transition">Dokumentasi</a>
              </nav>
              <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="mobile-nav items-center gap-3 text-slate-700">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>
              </button>
            </div>
            {mobileMenuOpen && (
              <div className="mobile-nav flex-col px-4 py-3 border-t border-slate-200 bg-slate-50 gap-2">

                    <select value={yearFilter} onChange={(e) => setYearFilter(e.target.value)} className="rounded-lg sm:rounded-xl border border-slate-300 px-3 sm:px-4 py-2.5 sm:py-3 outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-200 text-sm">
                      <option value="all">Semua Tahun</option>
                      {years.map(y => <option key={y} value={String(y)}>{y}</option>)}
                    </select>
                    <a href={CSV_URL} target="_blank" rel="noopener noreferrer" className="rounded-lg sm:rounded-xl bg-sky-600 hover:bg-sky-700 text-white px-3 sm:px-4 py-2.5 sm:py-3 text-center font-semibold shadow transition text-sm whitespace-nowrap">Unduh CSV</a>
                  </div>
                </div>

                <div className="space-y-3">
                  <div className="text-xs sm:text-sm text-slate-600 font-medium">
                    Menampilkan {paginatedRows.length ? (currentPage - 1) * itemsPerPage + 1 : 0} - {Math.min(currentPage * itemsPerPage, filteredRows.length)} dari {filteredRows.length} transaksi
                    {yearFilter !== 'all' && ` • Tahun ${yearFilter}`}
                  </div>
                  <div className="overflow-x-auto rounded-2xl border border-slate-200 shadow">
                    <table className="min-w-full text-xs sm:text-sm">
                      <thead className="bg-gradient-to-r from-slate-600 to-slate-700 text-white sticky top-0">
                        <tr>
                          <th className="px-3 sm:px-4 py-2.5 sm:py-3 text-left font-semibold w-8 sm:w-12">#</th>
                          <th className="px-3 sm:px-4 py-2.5 sm:py-3 text-left font-semibold">Tanggal</th>
                          <th className="px-3 sm:px-4 py-2.5 sm:py-3 text-left font-semibold">Uraian</th>
                          <th className="px-3 sm:px-4 py-2.5 sm:py-3 text-left font-semibold hidden sm:table-cell">Rincian</th>
                          <th className="px-3 sm:px-4 py-2.5 sm:py-3 text-right font-semibold">Kredit</th>
                          <th className="px-4 py-3 text-right font-semibold">Debit</th>
                          <th className="px-4 py-3 text-right font-semibold">Saldo</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-200">
                        {loading ? (
                          <tr><td colSpan="7" className="px-4 py-8 text-center text-slate-500">Memuat data...</td></tr>
                        ) : filteredRows.length ? (
                          paginatedRows.map((r, idx) => (
                            <tr key={idx} className={`${idx % 2 === 0 ? 'bg-white' : 'bg-slate-50'} hover:bg-blue-50 transition`}>
                              <td className="px-3 sm:px-4 py-3 text-slate-500 font-medium text-center w-8 sm:w-12 text-xs sm:text-sm">{(currentPage - 1) * itemsPerPage + idx + 1}</td>
                              <td className="px-3 sm:px-4 py-3 whitespace-nowrap font-medium text-slate-900 text-xs sm:text-sm">{r.tanggal.toLocaleDateString('id-ID')}</td>
                              <td className="px-3 sm:px-4 py-3 font-semibold text-slate-800 text-xs sm:text-sm">{r.uraian || '—'}</td>
                              <td className="px-3 sm:px-4 py-3 text-slate-600 text-xs sm:text-sm hidden sm:table-cell">{r.rincian || '—'}</td>
                              <td className="px-3 sm:px-4 py-3 text-right whitespace-nowrap font-semibold text-emerald-700 text-xs sm:text-sm">{r.kredit ? currency(r.kredit) : '—'}</td>
                              <td className="px-3 sm:px-4 py-3 text-right whitespace-nowrap font-semibold text-rose-700 text-xs sm:text-sm">{r.debit ? currency(r.debit) : '—'}</td>
                              <td className="px-3 sm:px-4 py-3 text-right whitespace-nowrap font-bold text-slate-900 bg-slate-100 text-xs sm:text-sm">{r.saldo ? currency(r.saldo) : '—'}</td>
                            </tr>
                          ))
                        ) : (
                          <tr><td colSpan="7" className="px-4 py-8 text-center text-slate-500">Data tidak ditemukan untuk filter yang dipilih.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                  
                  {filteredRows.length > 0 && totalPages > 1 && (
                    <div className="flex flex-col sm:flex-row items-center justify-between gap-3 sm:gap-4 mt-4">
                      <div className="text-xs sm:text-sm text-slate-600">
                        Halaman {currentPage} dari {totalPages}
                      </div>
                      <div className="flex flex-wrap gap-1 sm:gap-2 justify-center">
                        <button 
                          onClick={() => setCurrentPage(p => Math.max(1, p - 1))} 
                          disabled={currentPage === 1}
                          className="px-3 sm:px-4 py-2 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed font-medium text-sm"
                        >
                          ← Sebelumnya
                        </button>
                        <div className="flex gap-1">
                          {Array.from({ length: totalPages }, (_, i) => i + 1).map(page => (
                            <button
                              key={page}
                              onClick={() => setCurrentPage(page)}
                              className={`px-2 sm:px-3 py-2 rounded-lg font-medium text-sm ${
                                currentPage === page
                                  ? 'bg-sky-600 text-white'
                                  : 'border border-slate-300 text-slate-700 hover:bg-slate-50'
                              }`}
                            >
                              {page}
                            </button>
                          ))}
                        </div>
                        <button 
                          onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))} 
                          disabled={currentPage === totalPages}
                          className="px-3 sm:px-4 py-2 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed font-medium text-sm"
                        >
                          Selanjutnya →
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </section>

                    <table className="w-full text-xs sm:text-sm">
                      <thead className="bg-slate-100">

                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-200">
                        <tr className="hover:bg-slate-100"><td colSpan="2" className="px-3 sm:px-4 py-2 sm:py-3 font-bold text-amber-700 text-sm sm:text-base">PERNIKAHAN</td></tr>
                        <tr><td className="px-3 sm:px-4 py-2 sm:py-3">Menikah (pegawai/anak pegawai)</td><td className="px-3 sm:px-4 py-2 sm:py-3 text-right font-semibold">Rp 1,000,000</td></tr>
                        <tr className="text-xs text-slate-500"><td colSpan="2" className="px-3 py-2 italic">* Jika satu kantor maka dapat dua-duanya</td></tr>
                        
                        <tr className="hover:bg-slate-100"><td colSpan="2" className="px-3 sm:px-4 py-2 sm:py-3 font-bold text-amber-700 text-sm sm:text-base">SAKIT</td></tr>
                        <tr><td className="px-3 sm:px-4 py-2 sm:py-3">Opname intensif/ICU/operasi/sakit serius</td><td className="px-3 sm:px-4 py-2 sm:py-3 text-right font-semibold">Rp 1,500,000</td></tr>
                        <tr><td className="px-3 sm:px-4 py-2 sm:py-3">Rawat inap ≥2 malam (keluarga inti)</td><td className="px-3 sm:px-4 py-2 sm:py-3 text-right font-semibold">Rp 750,000</td></tr>
                        <tr><td className="px-3 sm:px-4 py-2 sm:py-3">Rawat inap &lt;2 malam (keluarga inti)</td><td className="px-3 sm:px-4 py-2 sm:py-3 text-right font-semibold">Rp 400,000</td></tr>
                        <tr><td className="px-3 sm:px-4 py-2 sm:py-3">Rawat di rumah ≥5 hari kerja (pegawai)</td><td className="px-3 sm:px-4 py-2 sm:py-3 text-right font-semibold">Rp 600,000</td></tr>

                        <tr><td className="px-3 sm:px-4 py-2 sm:py-3">Melahirkan (pegawai/pasangan)</td><td className="px-3 sm:px-4 py-2 sm:py-3 text-right font-semibold">Rp 750,000</td></tr>
                        <tr className="text-xs text-slate-500"><td colSpan="2" className="px-3 py-2 italic">* Bantuan berulang setelah 6 bulan perawatan berkelanjutan</td></tr>
                        
                        <tr className="hover:bg-slate-100"><td colSpan="2" className="px-3 sm:px-4 py-2 sm:py-3 font-bold text-amber-700 text-sm sm:text-base">MENINGGAL</td></tr>
                        <tr><td className="px-3 sm:px-4 py-2 sm:py-3">Keluarga inti (pegawai/pasangan/anak/orang tua/mertua)</td><td className="px-3 sm:px-4 py-2 sm:py-3 text-right font-semibold">Rp 1,500,000</td></tr>
                        <tr><td className="px-3 sm:px-4 py-2 sm:py-3">Orang tua</td><td className="px-3 sm:px-4 py-2 sm:py-3 text-right font-semibold">Rp 1,000,000</td></tr>
                        <tr><td className="px-3 sm:px-4 py-2 sm:py-3">Karangan bunga (di luar Babel - ybs/pasangan/orang tua pimpinan)</td><td className="px-3 sm:px-4 py-2 sm:py-3 text-right font-semibold">Rp 500,000</td></tr>
                        
                        <tr className="hover:bg-slate-100"><td colSpan="2" className="px-3 sm:px-4 py-2 sm:py-3 font-bold text-amber-700 text-sm sm:text-base">PINDAH/MUTASI</td></tr>
                        <tr><td className="px-3 sm:px-4 py-2 sm:py-3">Mutasi keluar provinsi</td><td className="px-3 sm:px-4 py-2 sm:py-3 text-right font-semibold">Rp 2,000,000</td></tr>
                        <tr><td className="px-3 sm:px-4 py-2 sm:py-3">Mutasi dalam provinsi</td><td className="px-3 sm:px-4 py-2 sm:py-3 text-right font-semibold">Rp 500,000</td></tr>
                        <tr><td className="px-3 sm:px-4 py-2 sm:py-3">Purnabakti (pegawai)</td><td className="px-3 sm:px-4 py-2 sm:py-3 text-right font-semibold">Rp 2,000,000</td></tr>
                      </tbody>
                    </table>
                  </div>
                </div>

                {/* Iuran RESAM per Grade */}

                          ['Grade 11', 'Rp 135,000'],

                            <td className="px-3 sm:px-4 py-2 sm:py-3 text-right font-semibold text-sky-700">{iuran}</td>

                <div className="mt-4 sm:mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">

                    'Seragam (Sehat Bersih Jaga Bersama) / Senam Bersama',

                    'Hari Statistik Nasional (HSN)',
                    'Peringatan 17 Agustus',
                    'Dan kegiatan lain dalam program Manajemen Perubahan/CAN'
                  ].map((item, idx) => (
                    <div key={idx} className="flex gap-3">
                      <div className="text-emerald-600 font-bold text-sm sm:text-base">✓</div>

          <section className="py-16 sm:py-20 bg-gradient-to-r from-sky-700 to-blue-900 text-white">
            <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 text-center">

              </div>
            </div>

                  <div className="text-white font-bold text-xl">RESAM</div>
                </div>
                <p className="mt-3 text-sm leading-7">Platform digital transparansi RESAM untuk BPS Provinsi Kepulauan Bangka Belitung.</p>
              </div>
              <div>
                <div className="text-white font-semibold">Menu</div>

                </ul>
              </div>
              <div>
                <div className="text-white font-semibold">Data Sumber</div>

                </ul>
              </div>
              <div>
                <div className="text-white font-semibold">Catatan</div>
                <p className="mt-3 text-sm leading-7">Untuk lingkungan produksi internal, sumber data sebaiknya dihubungkan melalui API atau Apps Script agar kontrol akses dan validasi data lebih stabil.</p>
              </div>
            </div>
            <div className="mt-10 text-center text-xs text-slate-500">© 2026 Sistem RESAM - dibuat dengan HTML, React, Tailwind, dan Chart.js</div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
